name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  REPO_OWNER: iskandar-mhadhbi
  FRONTEND_URL_PROD: http://localhost
jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: finance_dashboard_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      
      - name: Lint with ruff
        working-directory: backend
        run: ruff check .  

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: admin
          DB_PASSWORD: password
          DB_NAME: finance_dashboard_test
          JWT_SECRET: test-secret
          GROQ_API_KEY: test-key
          MARKETAUX_API_KEY: test-key
          FRONTEND_URL: http://localhost:5173
          FRONTEND_URL_DOCKER: http://localhost
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=html --cov-report=term --cov-fail-under=40
          
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.REPO_OWNER }}/finance-dashboard/backend:latest

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.REPO_OWNER }}/finance-dashboard/frontend:latest
          build-args: |
            VITE_API_URL=http://localhost:8000/api
            
  scan-backend:
    name: Scan Backend Image
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_OWNER }}/finance-dashboard/backend:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  scan-frontend:
    name: Scan Frontend Image
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_OWNER }}/finance-dashboard/frontend:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH          