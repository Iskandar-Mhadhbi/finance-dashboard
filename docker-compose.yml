services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_dashboard
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d finance_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: